# Default Terminology Library Configuration
# License-free terminology sources only
#
# For licensed systems (SNOMED CT, LOINC, RxNorm, CPT, etc.),
# mount your own config/ volume with a customized library.yml.

base:
  url: https://storage.googleapis.com/tx-fhir-org

sources:
  # Built-in code systems
  - internal:lang
  - internal:country
  - internal:currency
  - internal:mimetypes

  # UCUM - Unified Code for Units of Measure
  # - ucum:data/terminology-cache/ucum-essence-2.2.xml

  # SNOMED CT (International Edition)
  - snomed!:sct_intl_20260601.cache
  - snomed:sct_ch_20260607.cache

  # LOINC (Logical Observation Identifiers Names and Codes)
  - loinc:Loinc_2.82.db

  # Other FHIR packages
  - npm:ch.fhir.ig.ch-term#3.4.0
  - npm:ch.fhir.ig.ch-vacd#7.0.0-ballot
  - npm:ch.fhir.ig.ch-epreg#1.0.0
  - npm:ch.fhir.ig.ch-epl#1.0.1
  - npm:ch.fhir.ig.ch-elm#1.14.0
  - npm:ch.fhir.ig.ch-crl#0.9.0
  - npm:ch.fhir.ig.ch-ems#2.0.0-ballot
  - npm:ch.fhir.ig.ch-rad-order#2.0.1
  - npm:ch.fhir.ig.ch-orf#3.0.2
  - npm:ch.fhir.ig.ch-lab-order#3.0.0
  - npm:ch.fhir.ig.ch-lab-report#2.0.0
  - npm:ch.fhir.ig.ch-epreg#1.0.0
  - npm:ch.fhir.ig.ch-epr-fhir#5.0.0
  - npm:ch.fhir.ig.ch-emed-epr#3.0.0
  - npm:ch.fhir.ig.swissnoso#1.0.0
  - npm:swiss.mednet.fhir#0.20.0

